name: Elementor Playwright Tests

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download previous Allure history
        uses: actions/cache/restore@v4
        with:
          path: allure-history
          key: allure-history-${{ github.ref_name }}-${{ github.run_number }}
          restore-keys: |
            allure-history-${{ github.ref_name }}-

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ vars.BASE_URL }}

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Copy history from previous runs
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d allure-history/history ]; then
            cp -r allure-history/history/* allure-results/history/ || true
          fi

      - name: Add environment info to Allure
        if: always()
        run: |
          cat <<EOF > allure-results/environment.properties
          Browser=Chromium
          Base.URL=${{ vars.BASE_URL || 'https://wtfqsbkm.elementor.cloud/' }}
          Triggered.By=${{ github.actor }}
          Run.ID=${{ github.run_id }}
          Branch=${{ github.ref_name }}
          EOF

      - name: Add executor info to Allure
        if: always()
        run: |
          cat <<EOF > allure-results/executor.json
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "Run #${{ github.run_number }}",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "reportName": "Allure Report"
          }
          EOF

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Save history for next runs (keep last 10)
        if: always()
        run: |
          mkdir -p allure-history
          cp -r allure-report/history allure-history/ || true
          # Keep only last 10 runs in history
          if [ -d allure-history/history ]; then
            for f in allure-history/history/*.json; do
              [ -f "$f" ] && jq 'if type == "array" then .[-10:] else . end' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
            done
          fi

      - name: Save Allure history cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: allure-history
          key: allure-history-${{ github.ref_name }}-${{ github.run_number }}

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Publish to GitHub Pages
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Test Summary
        if: always()
        run: |
          echo "## 🎭 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f allure-report/widgets/summary.json ]; then
            PASSED=$(jq '.statistic.passed // 0' allure-report/widgets/summary.json)
            FAILED=$(jq '.statistic.failed // 0' allure-report/widgets/summary.json)
            BROKEN=$(jq '.statistic.broken // 0' allure-report/widgets/summary.json)
            TOTAL=$(jq '.statistic.total // 0' allure-report/widgets/summary.json)
            echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| ⚠️ Broken | $BROKEN |" >> $GITHUB_STEP_SUMMARY
            echo "| **Total** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No test results found" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Full report available in the **allure-report** artifact" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 [Allure Report on GitHub Pages](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY
